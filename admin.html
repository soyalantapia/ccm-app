  <body>
    <style>
      /* Static app shell: paints the hero before the JS bundle arrives (mobile
         LCP). React lo reemplaza al montar; replica layout y tokens default. */
      /* Usa los tokens --t-* (ya aplicados por el script pre-paint) con fallback
         al default vigente, para que un tema custom no choque con el shell. */
      #ccm-shell { background: var(--t-bg, #f5f0e8); color: var(--t-ink, #33261d); min-height: 100vh; }
      #ccm-shell .sh-header { height: 4rem; display: flex; align-items: center; border-bottom: 1px solid var(--t-line, #e1ddd5); }
      #ccm-shell .sh-wrap { max-width: 72rem; margin: 0 auto; padding: 0 1.25rem; width: 100%; box-sizing: border-box; }
      #ccm-shell .sh-mark { font-family: system-ui, sans-serif; font-weight: 800; letter-spacing: -.02em; font-size: 26px; line-height: 1; }
      #ccm-shell .sh-hero { padding-top: 2.5rem; }
      #ccm-shell .sh-eyebrow { display: flex; align-items: center; gap: .75rem; text-transform: uppercase; letter-spacing: .22em; font-size: .6875rem; font-weight: 600; color: var(--t-accent, #b8860b); font-family: system-ui, sans-serif; }
      #ccm-shell .sh-eyebrow::before { content: ''; width: 2rem; height: 1px; background: var(--t-accent, #b8860b); }
      #ccm-shell h1 { font-family: system-ui, -apple-system, sans-serif; font-weight: 750; font-size: clamp(2.4rem, 8.5vw, 5rem); line-height: 1.02; letter-spacing: -0.022em; margin: 1.5rem 0 0; }
      #ccm-shell h1 em { color: var(--t-accent, #b8860b); font-style: normal; }
      #ccm-shell .sh-sub { font-family: system-ui, sans-serif; font-weight: 500; font-size: 1.125rem; color: var(--t-ink-soft, #666666); margin-top: 1.5rem; }
      @media (min-width: 768px) { #ccm-shell .sh-hero { padding-top: 4rem; } #ccm-shell .sh-sub { font-size: 1.25rem; } }
    </style>
    <div id="root"><div id="ccm-shell">
      <header class="sh-header"><div class="sh-wrap"><span class="sh-mark">CCM</span></div></header>
      <div class="sh-wrap sh-hero">
        <p class="sh-eyebrow">14ª Edición · 19 y 20 de septiembre 2026</p>
        <h1>El <em>Ecosistema</em> de Negocios y <em>Tendencias</em> más influyente del interior del país</h1>
        <p class="sh-sub">Hotel Quinto Centenario · Córdoba · 9 a 21 hs</p>
      </div>
    </div></div>
    <script>
      // El shell solo corresponde a la landing; en rutas profundas se oculta.
      if (!/\/ccm-app\/?(\?|#|$)/.test(location.pathname + location.search)) {
        var sh = document.getElementById('ccm-shell')
        if (sh) sh.style.display = 'none'
      }
    </script>
