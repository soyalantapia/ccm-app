# Build de Railway (Nixpacks) para el server de CCM — Fase 0.
# Se despliega SOLO la carpeta server/ (railway up desde server/, o root dir = server/).
# No corre `tsc` (el alias @domain/types apunta a ../src que no se sube): se ejecuta
# con tsx, y domain.ts es type-only (no entra al grafo de runtime). Ver doc 10 / server/CLAUDE.md.

[phases.install]
# --include=dev: Railway pone NODE_ENV=production y npm ci omitiría prisma/tsx (devDeps).
cmds = ["npm ci --include=dev"]

[phases.build]
# Genera el client (necesita solo el schema, no la DB).
cmds = ["npx prisma generate"]

[start]
# Bootstrap Fase 0: sincroniza el schema a la DB (idempotente) y arranca.
# 🔶 Fase A: reemplazar `db push` por migraciones reales (`prisma migrate deploy`).
cmd = "npx prisma db push --skip-generate --accept-data-loss && npx tsx src/index.ts"
